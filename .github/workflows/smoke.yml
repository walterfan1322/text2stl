name: smoke

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install OS deps for cadquery
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1 libglu1-mesa libxrender1 libxkbcommon0 libxinerama1 libxcursor1
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pymeshfix scipy networkx pyvista RestrictedPython pymeshlab
      - name: Seed config.json from example
        run: cp config.example.json config.json
      - name: Run unit suites
        run: |
          set -e
          python tests/test_pattern_cache.py
          python tests/test_mesh_repair.py
          python tests/test_fix_hints.py
          python tests/test_shape_routing.py
          if [ -f tests/test_output_cache.py ]; then python tests/test_output_cache.py; fi
          if [ -f tests/test_judge_geometric.py ]; then python tests/test_judge_geometric.py; fi
          if [ -f tests/test_print_readiness.py ]; then python tests/test_print_readiness.py; fi
          if [ -f tests/test_structured_log.py ]; then python tests/test_structured_log.py; fi
          if [ -f tests/test_best_of_n.py ]; then python tests/test_best_of_n.py; fi
          if [ -f tests/test_sandbox_strict.py ]; then python tests/test_sandbox_strict.py; fi
          if [ -f tests/test_slicer_check.py ]; then python tests/test_slicer_check.py; fi
          if [ -f tests/test_refine_patch.py ]; then python tests/test_refine_patch.py; fi
          if [ -f tests/test_loft_topology.py ]; then python tests/test_loft_topology.py; fi

  smoke-benchmark:
    name: smoke benchmark
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run on PRs that touch generation logic — keep CI cheap on doc PRs
    if: |
      contains(github.event.pull_request.changed_files, 'app.py') ||
      contains(github.event.pull_request.changed_files, 'backends/') ||
      contains(github.event.pull_request.changed_files, 'mesh_repair.py') ||
      contains(github.event.pull_request.changed_files, 'judge') ||
      github.event_name == 'push'
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install OS deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1 libglu1-mesa libxrender1
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pymeshfix scipy networkx
      - name: Seed config.json from example
        run: cp config.example.json config.json
      - name: Start server in background
        run: |
          nohup python -m uvicorn app:app --host 127.0.0.1 --port 8765 > server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8765/api/stats >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8765/api/stats >/dev/null
      - name: Run smoke benchmark
        run: |
          python tests/benchmark_smoke.py
      - name: Regression check vs main baseline
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          if [ -f tests/regression_diff.py ] && [ -f tests/baseline.json ]; then
            python tests/regression_diff.py
          fi
      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          retention-days: 7
